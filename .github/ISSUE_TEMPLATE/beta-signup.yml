name: Private Beta Signup
description: Sign up for the pbir.tools private beta
title: "Beta signup"
labels: ["beta-signup"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in the **pbir.tools** private beta!

        By submitting this form, your GitHub username will be recorded.
        If approved, you will be granted read-only access to the private distribution repository.

  - type: textarea
    id: use-case
    attributes:
      label: How do you plan to use pbir.tools?
      description: Optional -- helps us prioritize features and understand your needs.
    validations:
      required: false

  - type: checkboxes
    id: consent
    attributes:
      label: Consent
      description: Required under GDPR (General Data Protection Regulation).
      options:
        - label: I consent to my GitHub username being stored solely for beta access management. I understand I can withdraw consent at any time by closing this issue.
          required: true
